<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JOEVIC PRESS</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }header {
  padding: 70px 20px;
  text-align: center;
  background: linear-gradient(135deg, #1e3a8a, #0f172a);
}

h1 { font-size: 42px; margin: 0; }
p { color: #cbd5e1; }

.container { padding: 30px 20px; max-width: 1000px; margin: auto; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
}

button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

button:hover { background: #2563eb; }

.upload-box {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

input {
  padding: 10px;
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

footer {
  text-align: center;
  padding: 20px;
  color: #94a3b8;
}

  </style>
</head>
<body><header>
  <h1>JOEVIC PRESS</h1>
  <p>Sell & Share Digital Products, Ebooks & Services</p>
</header><div class="container">  <h2>📚 Available Ebooks</h2>
  <div class="grid" id="bookList">
    <div class="card">No ebooks yet</div>
  </div>  <h2 style="margin-top:40px;">⬆ Upload Ebook (Demo)</h2>
  <div class="upload-box">
    <input type="text" id="title" placeholder="Ebook title" />
    <button onclick="addBook()">Add Ebook</button>
  </div>  <h2 style="margin-top:40px;">💳 Support / Payments</h2>
  <div class="card">
    <p>Support JOEVIC PRESS development</p>
    <button onclick="alert('Payment system coming soon (Stripe/PayPal setup needed)')">Donate</button>
  </div></div><footer>
  © 2026 JOEVIC PRESS
</footer><script>
  function addBook() {
    const title = document.getElementById('title').value;
    if (!title) return;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerText = title;

    document.getElementById('bookList').appendChild(card);
    document.getElementById('title').value = '';
  }
</script></body>
</html>
